name: Windows Build

on:
  push:
    branches: [ add-ci-workflow ]

env:
  INSTALL_PREFIX: 'C:\opt'
  BUILD_TYPE: Release

jobs:
  build:
    # this includes the MSVC compiler, python, cmake, ninja
    runs-on: windows-latest

    steps:
    - name: Create installation directory
      shell: powershell
      run: |
        If(!(test-path -PathType container $env:INSTALL_PREFIX))
        {
          New-Item -ItemType Directory -Path $env:INSTALL_PREFIX
        }

    - name: Intall Intel Fortran Essentials
      shell: powershell
      run: |
        $URL = "https://registrationcenter-download.intel.com/akdlm/IRC_NAS/b626b5cf-8a15-40a4-be9a-9edabbb7cf17/intel-fortran-essentials-2025.3.0.333_offline.exe"
        $TempDir = $env:TEMP
        curl.exe --output "$TempDir\webimage.exe" --url $URL --retry 5 --retry-delay 5
        Start-Process -Wait -FilePath "$TempDir\webimage.exe" -ArgumentList "-s --action install --components=default --eula=accept -p=NEED_VS2017_INTEGRATION=0 -p=NEED_VS2019_INTEGRATION=0 -p=NEED_VS2022_INTEGRATION=0 --log-dir=$TempDir"
        dir "C:\Program Files (x86)\Intel\oneAPI\"
        dir "C:\Program Files (x86)\Intel\oneAPI\mkl\"
        dir "C:\Program Files (x86)\Intel\oneAPI\mkl\latest\"
        dir "C:\Program Files (x86)\Intel\oneAPI\compiler\latest\bin\"

    - name: Setup Intel OneAPI
      shell: cmd
      run: |
        REM Set up environment variables for Intel compilers
        call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat"
        REM Verify Intel tools are accessible
        ifx /what
        echo "MKLROOT:" %MKLROOT%

    - name: Install Python dependencies
      shell: powershell
      run: |
        python -m pip install --upgrade pip
        pip install numpy
        python -c "import numpy; print(f'NumPy version: {numpy.__version__}')"

    - name: Build MUMPS
      shell: powershell
      run: |
        # Build MUMPS with Intel Fortran
        echo "Building MUMPS..."
        git clone https://github.com/scivision/mumps.git
        cd mumps
        cmake -B build `
          -DMUMPS_parallel=OFF `
          -DBUILD_COMPLEX=ON `
          -DBUILD_COMPLEX16=ON `
          -G Ninja `
          -DCMAKE_BUILD_TYPE="${{ env.BUILD_TYPE }}" `
          -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL_PREFIX }}" `
          -DCMAKE_Fortran_COMPILER=ifx
        cmake --build build
        cmake --install build
        cd ..

    - name: Build Qhull
      shell: powershell
      run: |
        # Build Qhull
        echo "Building Qhull..."
        git clone https://github.com/qhull/qhull.git
        cd qhull
        git checkout 2020.2
        cmake -B build `
          -G Ninja `
          -DCMAKE_BUILD_TYPE="${{ env.BUILD_TYPE }}" `
          -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL_PREFIX }}"
        cmake --build build
        cmake --install build
        cd ..

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build and install GetFEM
      shell: powershell
      run: |
        echo "Building GetFEM..."
        #cd getfem
        cmake -B build `
          -G Ninja `
          -DENABLE_PYTHON=ON `
          -DGENERATE_GETFEM_IM_LIST_H=OFF `
          -DENABLE_MULTITHREADED_BLAS=ON `
          -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON `
          -DMUMPS_LIB_DIR="${{ env.INSTALL_PREFIX }}\lib" `
          -DMUMPS_INC_DIR="${{ env.INSTALL_PREFIX }}\include" `
          -DCMAKE_BUILD_TYPE="${{ env.BUILD_TYPE }}" `
          -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL_PREFIX }}" `
          -DBLAS_LIBRARIES="$env:MKLROOT\lib\intel64\mkl_rt.lib" `
          -DLAPACK_LIBRARIES="$env:MKLROOT\lib\intel64\mkl_rt.lib"
        cmake --build build
        cmake --install build

    - name: Verify installations
      shell: powershell
      run: |
        echo "Verifying installed libraries..."
        dir "C:\opt\lib"
        dir "C:\opt\bin"
        echo "Build completed successfully!"
